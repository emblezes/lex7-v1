<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: A4;
            margin: 2cm;
            @bottom-center {
                content: "LegiX — Note d'impact confidentielle";
                font-size: 9px;
                color: #9ca3af;
            }
            @bottom-right {
                content: counter(page) " / " counter(pages);
                font-size: 9px;
                color: #9ca3af;
            }
        }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: #1f2937;
            line-height: 1.6;
            font-size: 11pt;
        }
        .header {
            border-bottom: 3px solid {{ color }};
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        .header h1 {
            color: {{ color }};
            margin: 0 0 8px 0;
            font-size: 20pt;
        }
        .header .company {
            font-size: 14pt;
            color: #374151;
        }
        .header .meta {
            color: #6b7280;
            font-size: 10pt;
            margin-top: 8px;
        }
        .level-badge {
            display: inline-block;
            background: {{ color }};
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 10pt;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .alert-summary {
            background: #f9fafb;
            border-left: 4px solid {{ color }};
            padding: 12px 16px;
            margin: 16px 0 24px 0;
            font-style: italic;
        }
        .content {
            white-space: pre-wrap;
        }
        h2 {
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 6px;
            margin-top: 28px;
            font-size: 14pt;
        }
        h3 {
            color: #374151;
            margin-top: 20px;
            font-size: 12pt;
        }
        .confidential {
            text-align: center;
            color: #dc2626;
            font-weight: bold;
            font-size: 10pt;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Note d'impact</h1>
        <div class="company">{{ company_name }}</div>
        <div class="meta">
            {% if metadata.date %}Date : {{ metadata.date }}{% endif %}
            {% if metadata.auteur %} | Auteur : {{ metadata.auteur }}{% endif %}
        </div>
    </div>

    <span class="level-badge">{{ impact_level }}</span>

    <div class="alert-summary">
        {{ alert_summary }}
    </div>

    <div class="content">{{ content }}</div>

    <div class="confidential">
        DOCUMENT CONFIDENTIEL — Usage interne uniquement
    </div>
</body>
</html>
